  <circle cx="60" cy="17" r="6" fill="#28c840"/>
  <text x="380" y="21" fill="#8b949e" text-anchor="middle">gbnf-doctor — lint · test · convert</text>

  <text x="24" y="64" fill="#7ee787">$ gbnf-doctor lint examples/broken.gbnf</text>
  <text x="24" y="86" fill="#c9d1d9">examples/broken.gbnf:6:21: <tspan fill="#f85149">error</tspan> E002 undefined rule "vlaue" (did you mean "value"?)</text>
  <text x="24" y="106" fill="#c9d1d9">examples/broken.gbnf:9:1: <tspan fill="#d29922">warning</tspan> W101 rule "helper" is defined but unreachable…</text>
  <text x="24" y="126" fill="#c9d1d9">examples/broken.gbnf:10:1: <tspan fill="#f85149">error</tspan> E004 left recursion detected (expr -&gt; expr) …</text>
  <text x="24" y="146" fill="#c9d1d9">examples/broken.gbnf: <tspan fill="#f85149">FAIL</tspan> (3 errors, 4 warnings)</text>

  <text x="24" y="180" fill="#7ee787">$ gbnf-doctor test examples/ipv4.gbnf "192.168.0.1" "256.1.1.1"</text>
  <text x="24" y="202" fill="#c9d1d9">examples/ipv4.gbnf: <tspan fill="#3fb950">MATCH</tspan> "192.168.0.1"</text>
  <text x="24" y="222" fill="#c9d1d9">examples/ipv4.gbnf: <tspan fill="#f85149">NO MATCH</tspan> "256.1.1.1" — at offset 2 (line 1, col 3):</text>
  <text x="24" y="242" fill="#c9d1d9">                    got "6", expected "." or "0"-"5"</text>

  <text x="24" y="276" fill="#7ee787">$ gbnf-doctor convert examples/ticket.schema.json</text>
  <text x="24" y="298" fill="#c9d1d9">root ::= "{" ws "\"id\"" ws ":" ws uuid "," ws "\"title\"" ws ":" ws title ...</text>
  <text x="24" y="318" fill="#c9d1d9">uuid ::= "\"" hex{8} "-" hex{4} "-" hex{4} "-" hex{4} "-" hex{12} "\"" ws</text>
  <text x="24" y="338" fill="#c9d1d9">priority ::= ( "\"low\"" ws | "\"normal\"" ws | "\"high\"" ws | "\"urgent\"" ws )</text>

  <text x="24" y="372" fill="#8b949e">no model loaded · zero dependencies · offline</text>
